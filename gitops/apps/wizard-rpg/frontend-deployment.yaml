apiVersion: apps/v1
kind: Deployment
metadata:
  name: wizard-rpg-frontend
  namespace: wizard-rpg
  labels:
    app.kubernetes.io/name: wizard-rpg-frontend
    app.kubernetes.io/part-of: wizard-rpg
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wizard-rpg-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wizard-rpg-frontend
        app.kubernetes.io/part-of: wizard-rpg
    spec:
      containers:
        - name: wizard-rpg-frontend
          image: ghcr.io/jwraats/wizard-rpg-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: nginx-config
          configMap:
            name: wizard-rpg-frontend-nginx
